name: Bug report
description: Something is broken
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in every field so we can reproduce fast.
        If this is a security vulnerability, do not open a public issue. Email `abuse@goxmr.click` instead.

  - type: input
    id: where
    attributes:
      label: Where it happens
      description: URL, dashboard section, API endpoint, or component name
      placeholder: e.g. https://goxmr.click/dashboard or /api/me/sync
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Log in as a fresh account
        2. Add an XMR wallet
        3. Click Save
        4. Expected ... but observed ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: e.g. Firefox 140 on macOS 14, or Brave 1.65 on Linux

  - type: textarea
    id: console
    attributes:
      label: Console errors or relevant logs
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues
          required: true
        - label: I confirmed this is not a question (questions go to Discussions)
          required: true
        - label: I am not reporting a security vulnerability (those go to abuse@goxmr.click)
          required: true
